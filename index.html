<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DBK Barcode Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Kanit', sans-serif; height: 100vh; background: #ffffff; overflow: hidden; }
    
    #custom-loader {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.95); z-index: 10000;
      flex-direction: column; align-items: center; justify-content: center;
    }
    .spinner { width: 45px; height: 45px; border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #login-page { position: fixed; top:0; left:0; width:100%; height:100%; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    .login-box { width: 100%; max-width: 320px; text-align: center; }
    .logo-circle { width: 70px; height: 70px; background: #000; border-radius: 22px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .logo-circle svg { width: 35px; fill: #fff; }
    
    input { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 16px; border: 1px solid #f0f0f0; background: #f9f9f9; font-family: 'Kanit'; font-size: 1rem; }
    #btn-login { width: 100%; padding: 18px; background: #000; color: #fff; border: none; border-radius: 16px; font-weight: 600; font-size: 1.1rem; cursor: pointer; }

    #main-app { display: none; flex-direction: column; height: 100vh; background: #000; }
    #camera-section { height: 35vh; background: #000; position: relative; overflow: hidden; }
    #reader { width: 100% !important; height: 100% !important; }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
    .laser-line { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: #ff0000; box-shadow: 0 0 10px #ff0000; z-index: 100; pointer-events: none; transform: translateY(-50%); }
    
    #list-section { flex: 1; background: #fdfdfd; border-top-left-radius: 35px; border-top-right-radius: 35px; padding: 25px; overflow-y: auto; z-index: 10; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); }
    .item-card { background: #ffffff; padding: 20px; margin-bottom: 15px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f5f5f5; border-left: 10px solid #2ecc71; }
    .btn-del { background: #fff0f0; color: #ff4d4d; border: none; padding: 12px 15px; border-radius: 14px; font-weight: 600; }
    
    #reader__dashboard_section_csr, #reader__status_span, #reader__header_message { display: none !important; }
  </style>
</head>
<body>

<div id="custom-loader"><div class="spinner"></div><p style="margin-top:15px;">กำลังตรวจสอบข้อมูล...</p></div>

<div id="login-page">
  <div class="login-box">
    <div class="logo-circle"><svg viewBox="0 0 24 24"><path d="M4,6H6V18H4V6M7,6H8V18H7V6M9,6H12V18H9V6M13,6H14V18H13V6M16,6H18V18H16V6M19,6H20V18H19V6M21,6H22V18H21V6Z"/></svg></div>
    <h1>DBK ระบบกรอกบาร์โค้ด</h1>
    <input type="text" id="user" placeholder="ชื่อผู้ใช้งาน" autocomplete="off">
    <input type="password" id="pass" placeholder="รหัสผ่าน">
    <button id="btn-login" onclick="handleLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="main-app">
  <div id="camera-section">
    <div id="reader"></div>
    <div class="laser-line"></div>
  </div>
  <div id="list-section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="margin:0; font-size:0.9rem; color:#888;">ผู้บันทึก: <span id="user-display" style="color:#000;">-</span></h2>
      <span id="counter" style="background:#000; color:#fff; padding:6px 18px; border-radius:20px; font-weight:bold;">0</span>
    </div>
    <div id="scanned-list"></div>
    <button onclick="logout()" style="width:100%; padding:15px; margin-top:20px; background:none; border:1px solid #ddd; border-radius:15px; color:#888; font-family:'Kanit'; cursor:pointer;">ออกจากระบบ</button>
  </div>
</div>

<script>
  // !!! สำคัญ: ใส่ URL ของ Web App ตรงนี้ !!!
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVScYLOySGh6KOPeH2xA4pG1Vi_NvCgHx0ez59tmokMYzypQVepbePoHiFZBaEGK-H/exec"; 
  const SESSION_DURATION = 30 * 60 * 1000; 

  let currentUser = "";
  let count = 0;
  let isScanning = false;
  let timeoutHandler;
  let lastResult = "";
  let matchCount = 0;
  const html5QrCode = new Html5Qrcode("reader");

  // ตรวจสอบ Session เมื่อเปิดเว็บ
  window.onload = function() {
    const savedUser = localStorage.getItem('loggedUser');
    const lastActive = localStorage.getItem('lastActiveTime');
    const now = new Date().getTime();

    if (savedUser && lastActive && (now - lastActive < SESSION_DURATION)) {
      currentUser = savedUser;
      document.getElementById('user-display').innerText = currentUser;
      showApp();
      updateSessionTime();
    } else {
      localStorage.clear();
      document.getElementById('login-page').style.display = 'flex';
    }
  };

  function updateSessionTime() {
    if (!currentUser) return;
    localStorage.setItem('lastActiveTime', new Date().getTime());
    clearTimeout(timeoutHandler);
    timeoutHandler = setTimeout(() => {
      Swal.fire({ title: 'หมดเวลาใช้งาน', text: 'กรุณาเข้าสู่ระบบใหม่', icon: 'info' }).then(logout);
    }, SESSION_DURATION);
  }

  function logout() {
    localStorage.clear();
    currentUser = "";
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
    if (html5QrCode.isScanning) html5QrCode.stop().catch(() => {});
  }

  window.addEventListener('click', updateSessionTime);

  async function callApi(payload) {
    try {
      const response = await fetch(SCRIPT_URL, { 
        method: "POST", 
        body: JSON.stringify(payload) 
      });
      const data = await response.json(); // ต้องมีบรรทัดนี้เพื่อแปลง JSON เป็น Object
      return data;
    } catch (e) { 
      return null; 
    }
  }

  // --- ปรับปรุง Login พร้อมอนิเมชั่นและบอกเหตุผล ---
  async function handleLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    
    if(!u || !p) {
      return Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอก User และ Pass' });
    }
    
    document.getElementById('custom-loader').style.display = 'flex';
    
    try {
      const res = await callApi({ action: 'checkLogin', user: u, pass: p });
      console.log("Server Response:", res); // ดูค่าที่ตอบกลับมาใน Console
      
      document.getElementById('custom-loader').style.display = 'none';

      if (!res) {
        Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'เซิร์ฟเวอร์ส่งค่าว่างกลับมา' });
        return;
      }

      if (res.success === true) {
        currentUser = res.displayName;
        localStorage.setItem('loggedUser', currentUser);
        updateSessionTime();
        document.getElementById('user-display').innerText = currentUser;
        
        await Swal.fire({
          icon: 'success',
          title: 'สำเร็จ!',
          text: 'ยินดีต้อนรับ ' + currentUser,
          timer: 1500,
          showConfirmButton: false
        });
        showApp();
      } else {
        // จุดสำคัญ: บังคับให้แสดง msg ที่ส่งมาจาก echo
        Swal.fire({
          icon: 'error',
          title: 'เข้าสู่ระบบล้มเหลว',
          text: res.msg || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง",
          confirmButtonColor: '#d33'
        });
      }
    } catch (err) {
      document.getElementById('custom-loader').style.display = 'none';
      Swal.fire({ icon: 'error', title: 'Error', text: err.message });
    }
  }
  function showApp() {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    startScanner();
  }

  function startScanner() {
    const config = { fps: 15, qrbox: { width: 250, height: 120 }, aspectRatio: 1.0 };
    html5QrCode.start({ facingMode: "environment" }, config, (text) => {
      if (!isScanning) onSuccess(text);
    }).catch(() => {});
  }

  async function onSuccess(barcode) {
    if (barcode === lastResult) { matchCount++; } else { lastResult = barcode; matchCount = 0; return; }
    if (matchCount >= 1) { 
      isScanning = true;
      matchCount = 0; lastResult = "";
      document.getElementById('custom-loader').style.display = 'flex';
      const res = await callApi({ action: 'saveBarcode', barcode: barcode, currentUser: currentUser });
      document.getElementById('custom-loader').style.display = 'none';
      if (res) { updateUI(res); setTimeout(() => { isScanning = false; }, 1000); } else { isScanning = false; }
    }
  }

  function updateUI(data) {
    const list = document.getElementById('scanned-list');
    const div = document.createElement('div');
    div.className = 'item-card';
    div.id = data.id;
    div.innerHTML = `<div class="info"><b>${data.barcode}</b><p>🕒 ${data.time}</p></div><button class="btn-del" onclick="del('${data.id}')">ลบ</button>`;
    list.insertBefore(div, list.firstChild);
    count++;
    document.getElementById('counter').innerText = count;
  }

  async function del(id) {
    const confirm = await Swal.fire({ title: 'ลบรายการนี้?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#000' });
    if (confirm.isConfirmed) {
      document.getElementById('custom-loader').style.display = 'flex';
      const success = await callApi({ action: 'deleteRowById', id: id });
      document.getElementById('custom-loader').style.display = 'none';
      if(success) {
        const el = document.getElementById(id);
        el.style.transform = "translateX(100%)"; el.style.opacity = "0";
        setTimeout(() => { el.remove(); count--; document.getElementById('counter').innerText = count; }, 300);
      }
    }
  }
</script>
</body>
</html>
